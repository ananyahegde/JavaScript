<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <h1> Weather App </h1>
    
    <div class="container"> 
      <input type="text" id="cityInput" placeholder="Enter city name">
      <button id="get" onclick="getWeatherInfo()"> Get </button>
      
      <div class="weather-container">
        <div class="weather-item">
          <h3>Humidity</h3>
          <p class="humidity"></p>
        </div>

        <div class="weather-item">
          <h3>Temperature</h3>
          <p class="temp"></p>
        </div>

        <div class="weather-item">
          <h3>Wind Speed</h3>
          <p class="wind_speed"></p>
        </div>

        <div class="weather-item">
          <h3>Weather<br>Condition</h3>
          <p class="condition"></p>
        </div>
      </div>

    </div>
  </body>
  <script src="./index.js"></script>
</html>
