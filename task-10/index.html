<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumière</title>
    <link href="https://fonts.googleapis.com/css2?family=Jim+Nightshade&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div class="hero-section">
      <h3>Where style</h3>
      <h1>Lumière</h1>
      <h3>finds its light.</h3>
    </div>

    <nav class="navbar">
      <a href="#cart">Cart</a>
      <a href="#browse">Browse</a>
      <a href="#home">Home</a>
    </nav>

    <!-- Home Section -->
    <div id="home" class="section">
      <h3>Our Collection</h3>

      <div class="product-card">
        <img src="./assets/images/5.png" alt="Dress">
        <h5>Ivory Reverie Dress</h5>
        <p>₹2,599</p>
      </div>

      <div class="product-card">
        <img src="./assets/images/8.png" alt="White Dress">
        <h5> Champagne Dusk Dress </h5>
        <p>₹2,199</p>
      </div>

      <div class="product-card">
        <img src="./assets/images/10.png" alt="Yellow Dress">
        <h5> Mauve Petal Dress </h5>
        <p>₹1,799</p>
      </div>

      <div class="product-card">
        <img src="./assets/images/15.jpg" alt="Summer Dress">
        <h5> Amber Silk Dress </h5>
        <p>₹1,499</p>
      </div>

    </div>

    <!-- Browse Section -->
    <div id="browse" class="section">
      <h3> Our Entire Collection </h3>
    </div>

    <!-- Cart Section -->
    <div id="cart" class="section">
    </div>

    <script type="module" src="./index.js"></script>
  </body>
</html>
